ТЕНИ
1. Тень уже объекта
Используй `inset` тень или уменьши `blur` радиус, чтобы тень не вылезала по краям:
.tab-button {
    background: var(--grey-bg-white);
    border-color: var(--grey-text-light);
    color: var(--grey-text-light);
        box-shadow: 
        0 26px 1px -8px rgba(131,127,135,0.2),
        0 0 0 0.5px #000000;
}

    box-shadow: 
        0 4px 8px rgba(131,127,135,0.2); /* меньше размытия */


